<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Диктант (Web TTS)</title>
  <style>
    body { font-family: Segoe UI, Arial, sans-serif; margin: 20px; background: #f7f7fa; color: #1a1a1a; }
    .card { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 14px; margin-bottom: 12px; }
    textarea { width: 100%; min-height: 180px; font-size: 15px; padding: 10px; box-sizing: border-box; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .settings-row { justify-content: center; }
    .settings-row label { display: inline-flex; align-items: center; gap: 6px; }
    button, select, input { font-size: 14px; padding: 7px 10px; }
    .controls-row { justify-content: center; flex-wrap: nowrap; }
    .btn-main { font-size: 22px; padding: 14px 24px; min-height: 64px; min-width: 280px; font-weight: 600; }
    .btn-icon { font-size: 18px; padding: 12px 16px; min-height: 56px; min-width: 88px; }
    #wordsView { min-height: 120px; line-height: 1.8; white-space: pre-wrap; }
    .word { padding: 1px 2px; border-radius: 4px; }
    .current { background: #fff2a8; }
    .status { font-size: 14px; color: #444; }
    label { font-size: 14px; }
    @media (max-width: 860px) {
      .controls-row { flex-wrap: wrap; }
      .btn-main { width: 100%; min-width: 0; font-size: 24px; min-height: 72px; }
      .btn-icon { flex: 1 1 calc(33% - 10px); min-width: 90px; font-size: 20px; min-height: 60px; }
    }
  </style>
</head>
<body>
  <h2 style="text-align: center;">Диктант (Web TTS)</h2>

  <div class="card">
    <label for="inputText">Текст для диктанта</label>
    <textarea id="inputText" placeholder="Вставьте текст..."></textarea>
    <div class="row controls-row" style="margin-top: 10px;">
      <button id="loadFileBtn" class="btn-main">Загрузить .txt</button>
      <input id="fileInput" type="file" accept=".txt,text/plain" style="display: none;" />
      <button id="prepareBtn" class="btn-main">Подготовить</button>
    </div>
  </div>

  <div class="card">
    <div class="row settings-row">
      <label>Режим:
        <select id="modeSelect">
          <option value="auto">Авто</option>
          <option value="click">По клику</option>
        </select>
      </label>
      <label>Читать:
        <select id="autoUnit">
          <option value="word">по словам</option>
          <option value="sentence">по предложениям</option>
        </select>
      </label>
      <label>Скорость:
        <input id="rateInput" type="number" min="0.5" max="2" step="0.1" value="1.0" />
      </label>
      <label>Пауза (сек):
        <input id="pauseInput" type="number" min="0" max="5" step="0.1" value="0.35" />
      </label>
      <label>Язык:
        <select id="langSelect">
          <option value="auto">Авто</option>
          <option value="ru-RU">RU</option>
          <option value="en-US">EN</option>
        </select>
      </label>
      <label>Голос:
        <select id="voiceSelect"></select>
      </label>
    </div>
  </div>

  <div class="card">
    <div class="row controls-row">
      <button id="actionBtn" class="btn-main">Следующее</button>
      <button id="startBtn" class="btn-icon" title="Старт">▶</button>
      <button id="stopBtn" class="btn-icon" title="Стоп">■</button>
      <button id="resetBtn" class="btn-icon" title="Сначала / Обновить">⟳</button>
    </div>
  </div>

  <div class="card">
    <div id="wordsView"></div>
  </div>

  <div class="status" id="status">Вставьте текст и нажмите «Подготовить».</div>

  <script>
    const WORD_RE = /[A-Za-zА-Яа-яЁё0-9']+/g;
    const CYR_RE = /[А-Яа-яЁё]/g;
    const LAT_RE = /[A-Za-z]/g;

    const inputText = document.getElementById("inputText");
    const loadFileBtn = document.getElementById("loadFileBtn");
    const fileInput = document.getElementById("fileInput");
    const prepareBtn = document.getElementById("prepareBtn");
    const actionBtn = document.getElementById("actionBtn");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const resetBtn = document.getElementById("resetBtn");
    const modeSelect = document.getElementById("modeSelect");
    const autoUnit = document.getElementById("autoUnit");
    const rateInput = document.getElementById("rateInput");
    const pauseInput = document.getElementById("pauseInput");
    const langSelect = document.getElementById("langSelect");
    const voiceSelect = document.getElementById("voiceSelect");
    const wordsView = document.getElementById("wordsView");
    const statusEl = document.getElementById("status");

    let words = [];
    let sentences = [];
    let index = 0;
    let sentenceIndex = 0;
    let running = false;
    let stopRequested = false;
    let voices = [];

    function extractWords(text) {
      return text.match(WORD_RE) || [];
    }

    function splitSentences(text) {
      const normalized = text.replace(/\s+/g, " ").trim();
      if (!normalized) return [];
      return normalized.split(/(?<=[.!?…])\s+/).filter(Boolean);
    }

    function detectLanguage(text) {
      const c = (text.match(CYR_RE) || []).length;
      const l = (text.match(LAT_RE) || []).length;
      if (c === 0 && l === 0) return "ru-RU";
      return c >= l ? "ru-RU" : "en-US";
    }

    function updateStatus(text) {
      statusEl.textContent = text;
    }

    function renderWords() {
      wordsView.innerHTML = "";
      words.forEach((w, i) => {
        const span = document.createElement("span");
        span.className = "word";
        span.textContent = w + " ";
        wordsView.appendChild(span);
      });
      if (autoUnit.value === "word") {
        highlightWord(index);
      }
    }

    function highlightWord(i) {
      const spans = wordsView.querySelectorAll(".word");
      spans.forEach((s, idx) => s.classList.toggle("current", idx === i));
      if (spans[i]) spans[i].scrollIntoView({ block: "nearest", inline: "nearest" });
    }

    function fillVoices() {
      voices = speechSynthesis.getVoices();
      const current = voiceSelect.value;
      voiceSelect.innerHTML = "";
      const autoOpt = document.createElement("option");
      autoOpt.value = "";
      autoOpt.textContent = "Автовыбор";
      voiceSelect.appendChild(autoOpt);

      voices.forEach((v, i) => {
        const opt = document.createElement("option");
        opt.value = String(i);
        opt.textContent = `${v.name} (${v.lang})`;
        voiceSelect.appendChild(opt);
      });

      if (current && voiceSelect.querySelector(`option[value="${current}"]`)) {
        voiceSelect.value = current;
      }
    }

    function chooseVoice(lang) {
      if (voiceSelect.value !== "") {
        const idx = Number(voiceSelect.value);
        if (!Number.isNaN(idx) && voices[idx]) return voices[idx];
      }
      const langPrefix = (lang || "ru-RU").slice(0, 2).toLowerCase();
      return voices.find(v => (v.lang || "").toLowerCase().startsWith(langPrefix)) || null;
    }

    function speakOnce(text, langHint) {
      return new Promise((resolve) => {
        const utter = new SpeechSynthesisUtterance(text);
        const selectedLang = langSelect.value === "auto" ? (langHint || detectLanguage(text)) : langSelect.value;
        utter.lang = selectedLang;
        utter.rate = Math.max(0.5, Math.min(2, Number(rateInput.value) || 1));
        const voice = chooseVoice(selectedLang);
        if (voice) utter.voice = voice;
        utter.onend = () => resolve();
        utter.onerror = () => resolve();
        speechSynthesis.speak(utter);
      });
    }

    function stopSpeech() {
      stopRequested = true;
      running = false;
      speechSynthesis.cancel();
    }

    function updateModeUi() {
      const mode = modeSelect.value;
      const unitText = autoUnit.value === "sentence" ? "предложение" : "слово";
      actionBtn.textContent = `Следующее ${unitText}`;
      actionBtn.disabled = mode !== "click";
      startBtn.disabled = mode !== "auto";
    }

    function decodeTextFile(arrayBuffer) {
      const bytes = new Uint8Array(arrayBuffer);
      const utf8 = new TextDecoder("utf-8", { fatal: false }).decode(bytes);
      if (utf8.includes("\uFFFD")) {
        try {
          return new TextDecoder("windows-1251", { fatal: false }).decode(bytes);
        } catch (_e) {
          return utf8;
        }
      }
      return utf8;
    }

    function sleep(ms) {
      return new Promise(r => setTimeout(r, ms));
    }

    async function runAuto() {
      if (!words.length) return;
      running = true;
      stopRequested = false;

      if (autoUnit.value === "sentence") {
        const items = sentences.length ? sentences : [words.join(" ")];
        sentenceIndex = 0;
        for (let i = 0; i < items.length; i++) {
          if (stopRequested) break;
          sentenceIndex = i;
          updateStatus(`Предложение ${i + 1}/${items.length}...`);
          await speakOnce(items[i], detectLanguage(items[i]));
          if (stopRequested) break;
          await sleep(Math.max(0, Number(pauseInput.value) || 0) * 1000);
        }
      } else {
        while (index < words.length && !stopRequested) {
          const w = words[index];
          highlightWord(index);
          updateStatus(`Слово ${index + 1}/${words.length}: ${w}`);
          index += 1;
          await speakOnce(w, detectLanguage(w));
          if (stopRequested) break;
          await sleep(Math.max(0, Number(pauseInput.value) || 0) * 1000);
        }
      }

      running = false;
      updateStatus("Авто-режим завершен.");
    }

    async function runClickStep() {
      stopSpeech();
      if (!words.length) prepareBtn.click();
      if (!words.length) return;

      if (autoUnit.value === "sentence") {
        const items = sentences.length ? sentences : [words.join(" ")];
        if (sentenceIndex >= items.length) {
          updateStatus("Конец текста. Нажмите «Сначала».");
          return;
        }
        const sent = items[sentenceIndex];
        updateStatus(`Предложение ${sentenceIndex + 1}/${items.length}`);
        sentenceIndex += 1;
        await speakOnce(sent, detectLanguage(sent));
        return;
      }

      if (index >= words.length) {
        updateStatus("Конец текста. Нажмите «Сначала».");
        return;
      }
      const w = words[index];
      highlightWord(index);
      index += 1;
      updateStatus(`Слово ${index}/${words.length}: ${w}`);
      await speakOnce(w, detectLanguage(w));
    }

    prepareBtn.addEventListener("click", () => {
      stopSpeech();
      const text = inputText.value.trim();
      if (!text) {
        updateStatus("Текст пустой.");
        return;
      }
      words = extractWords(text);
      sentences = splitSentences(text);
      index = 0;
      sentenceIndex = 0;
      renderWords();
      updateStatus(`Готово: ${words.length} слов.`);
    });

    loadFileBtn.addEventListener("click", () => fileInput.click());

    fileInput.addEventListener("change", async () => {
      const file = fileInput.files && fileInput.files[0];
      if (!file) return;
      try {
        const buf = await file.arrayBuffer();
        inputText.value = decodeTextFile(buf);
        updateStatus(`Файл загружен: ${file.name}. Нажмите «Подготовить».`);
      } catch (_e) {
        updateStatus("Не удалось прочитать файл.");
      } finally {
        fileInput.value = "";
      }
    });

    actionBtn.addEventListener("click", async () => {
      if (modeSelect.value !== "click") return;
      await runClickStep();
    });

    startBtn.addEventListener("click", async () => {
      if (modeSelect.value !== "auto") return;
      if (running) return;
      if (!words.length) prepareBtn.click();
      if (!words.length) return;
      stopRequested = false;
      await runAuto();
    });

    stopBtn.addEventListener("click", () => {
      stopSpeech();
      updateStatus("Остановлено.");
    });

    resetBtn.addEventListener("click", () => {
      stopSpeech();
      index = 0;
      sentenceIndex = 0;
      renderWords();
      updateStatus("Сброшено.");
    });

    modeSelect.addEventListener("change", updateModeUi);
    autoUnit.addEventListener("change", () => {
      if (autoUnit.value === "word") {
        highlightWord(index);
      } else {
        wordsView.querySelectorAll(".word").forEach((s) => s.classList.remove("current"));
      }
      updateModeUi();
    });

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        if (e.target === inputText) return;
        e.preventDefault();
        if (modeSelect.value === "click") {
          actionBtn.click();
        }
      }
    });

    speechSynthesis.onvoiceschanged = fillVoices;
    fillVoices();
    updateModeUi();
  </script>
</body>
</html>
